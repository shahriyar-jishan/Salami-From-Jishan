<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a2a1a"/>
  <title>Eid Mubarak 🌙</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f0c040;
      --gold-dark: #c89a10;
      --green-deep: #0a2a1a;
      --cream: #fdf6e3;
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      background: var(--green-deep);
      overflow-x: hidden;
      overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #starsCanvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── Lanterns ── */
    .lanterns {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1;
      pointer-events: none;
      display: flex; justify-content: space-around;
    }
    .lantern-wrap {
      display: flex; flex-direction: column; align-items: center;
      animation: swing var(--sw, 4s) ease-in-out infinite alternate;
      transform-origin: top center;
    }
    @keyframes swing { from { transform: rotate(-7deg); } to { transform: rotate(7deg); } }
    .lantern-string { width: 2px; height: 40px; background: var(--gold-dark); }
    .lantern-body {
      width: 20px; height: 30px; border-radius: 10px 10px 13px 13px;
      position: relative; overflow: hidden;
      box-shadow: 0 0 12px 4px rgba(240,192,64,0.5);
    }
    .lantern-body::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
    }
    .lantern-glow {
      position: absolute; inset: 0;
      animation: lglow 2s ease-in-out infinite alternate;
    }
    @keyframes lglow { from { opacity: 0.65; } to { opacity: 1; } }
    .lantern-cap    { width: 24px; height: 7px; border-radius: 4px; margin-bottom: -2px; }
    .lantern-tassel { width: 2px; height: 9px; border-radius: 1px; margin-top: -2px; }

    /* ── Petals ── */
    .petal {
      position: fixed; z-index: 2; pointer-events: none;
      animation: petalFall linear infinite;
    }
    @keyframes petalFall {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ── Wrapper ── */
    .wrapper {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      /* top padding for lanterns, bottom for safe area */
      padding: 70px 14px 28px;
    }

    /* ── Card ── */
    .card {
      background: linear-gradient(160deg, #0f3d26 0%, #082015 100%);
      border: 1.5px solid rgba(240,192,64,0.28);
      border-radius: 22px;
      padding: 28px 18px 26px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(240,192,64,0.06),
        0 8px 40px rgba(0,0,0,0.55),
        0 0 50px rgba(26,107,60,0.18) inset;
      animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card::before, .card::after {
      content: '✦'; position: absolute;
      color: var(--gold); font-size: 14px; opacity: 0.45;
      animation: spin 9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card::before { top: 11px; left: 13px; }
    .card::after  { bottom: 11px; right: 13px; animation-direction: reverse; }

    /* ── Arabic ── */
    .arabic {
      font-family: 'Amiri', serif;
      font-size: clamp(1.3rem, 5.5vw, 1.9rem);
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 14px rgba(240,192,64,0.5);
      margin-bottom: 2px;
      line-height: 1.3;
    }

    /* ── Heading ── */
    .eid-heading {
      font-family: 'Amiri', serif;
      font-size: clamp(1.7rem, 7.5vw, 2.5rem);
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(240,192,64,0.4);
      margin-bottom: 3px;
      line-height: 1.1;
    }

    .tagline {
      font-size: clamp(0.65rem, 2.4vw, 0.78rem);
      color: rgba(255,255,255,0.42);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 7px;
      margin: 0 auto 16px;
    }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(240,192,64,0.38), transparent); }
    .divider-dot  { font-size: 12px; color: var(--gold); opacity: 0.6; }

    /* ── Wish text ── */
    .wish-text {
      font-size: clamp(0.76rem, 3vw, 0.88rem);
      color: rgba(253,246,227,0.75);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    /* ── Label ── */
    .input-label {
      font-size: clamp(0.62rem, 2.2vw, 0.72rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240,192,64,0.68);
      margin-bottom: 8px;
      display: block;
      text-align: center;
    }

    /* ── Phone row ── */
    .phone-row {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .flag-box {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(240,192,64,0.28);
      border-radius: 12px;
      padding: 0 10px;
      color: var(--gold);
      font-size: 0.8rem;
      white-space: nowrap;
      font-weight: 600;
      /* min tap height */
      min-height: 52px;
    }
    .flag-emoji { font-size: 1rem; }

    .phone-input {
      flex: 1;
      min-width: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(240,192,64,0.28);
      border-radius: 12px;
      padding: 0 14px;
      /* 52px height = comfortable mobile tap target */
      min-height: 52px;
      color: var(--cream);
      /* 16px prevents iOS auto-zoom on focus */
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 1.5px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .phone-input::placeholder { color: rgba(255,255,255,0.22); letter-spacing: 0.5px; }
    .phone-input:focus {
      border-color: var(--gold);
      background: rgba(240,192,64,0.06);
      box-shadow: 0 0 0 3px rgba(240,192,64,0.11);
    }

    /* ── Error ── */
    .error-msg {
      color: #ff8080;
      font-size: 0.74rem;
      min-height: 16px;
      margin-bottom: 10px;
      text-align: left;
      padding-left: 2px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .error-msg.show { opacity: 1; }

    /* ── Button ── */
    .btn {
      width: 100%;
      /* large tap target */
      min-height: 54px;
      padding: 0 16px;
      border: none; outline: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #f0c040 0%, #c89a10 100%);
      color: var(--green-deep);
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      cursor: pointer;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 18px rgba(240,192,64,0.36);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer { to { left: 160%; } }
    .btn:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(240,192,64,0.28); }

    /* ── Footer ── */
    .footer-note {
      margin-top: 16px;
      font-size: 0.62rem;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<canvas id="starsCanvas"></canvas>
<div class="lanterns" id="lanterns"></div>
<div id="petals"></div>

<div class="wrapper">
  <div class="card">

    <div class="arabic">عيد مبارك</div>
    <h1 class="eid-heading">Eid Mubarak</h1>
    <p class="tagline">✦ &nbsp; ঈদ মোবারক &nbsp; ✦</p>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-dot">☽</span>
      <span class="divider-dot">★</span>
      <span class="divider-dot">☽</span>
      <span class="divider-line"></span>
    </div>

    <p class="wish-text">
      May the blessings of Allah fill your life with happiness and open all the doors of success,
      now and always. Wishing you and your family a joyful Eid celebration! 🌙
    </p>

    <label class="input-label" for="phone">Give me your phone number so I can send you a recharge as eid salami.</label>
    <div class="phone-row">
      <div class="flag-box">
        <span class="flag-emoji">🇧🇩</span>
        <span>+880</span>
      </div>
      <input
        class="phone-input"
        id="phone"
        type="tel"
        inputmode="numeric"
        maxlength="11"
        placeholder="01X XXXX XXXX"
        autocomplete="tel"
      />
    </div>
    <div class="error-msg" id="errorMsg">⚠ সঠিক ১১ সংখ্যার বাংলাদেশী নম্বর দিন</div>

    <button class="btn" onclick="handleContinue()">
      🌙 &nbsp; Continue &nbsp; →
    </button>

    <p class="footer-note">Developed by Shahriyar Jishan </p>
  </div>
</div>

<script>
  /* ── Stars ── */
  (function(){
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = Array.from({length: 120}, () => ({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.3+0.3,
        a: Math.random(),
        da: (Math.random()*0.009+0.003)*(Math.random()<0.5?1:-1)
      }));
    }
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      stars.forEach(s=>{
        s.a=Math.max(0.05,Math.min(1,s.a+s.da));
        if(s.a>=1||s.a<=0.05)s.da*=-1;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,240,${s.a})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize',resize);
    resize(); draw();
  })();

  /* ── Lanterns ── */
  (function(){
    const colors=[
      {body:'#c0392b',glow:'#e74c3c'},{body:'#d4880a',glow:'#f0c040'},
      {body:'#1a6b3c',glow:'#2ecc71'},{body:'#8e44ad',glow:'#9b59b6'},
      {body:'#c0392b',glow:'#e74c3c'},{body:'#d4880a',glow:'#f0c040'}
    ];
    const wrap=document.getElementById('lanterns');
    colors.forEach(c=>{
      const sw=(3+Math.random()*3).toFixed(1);
      wrap.innerHTML+=`
        <div class="lantern-wrap" style="--sw:${sw}s;margin-top:${Math.random()*12}px">
          <div class="lantern-cap" style="background:${c.body}"></div>
          <div class="lantern-string"></div>
          <div class="lantern-body" style="background:${c.body}">
            <div class="lantern-glow" style="background:radial-gradient(circle,${c.glow}cc,transparent 70%)"></div>
          </div>
          <div class="lantern-tassel" style="background:${c.body}"></div>
        </div>`;
    });
  })();

  /* ── Petals ── */
  (function(){
    const sym=['🌸','✨','⭐','🌙','💛','🌺'];
    const wrap=document.getElementById('petals');
    for(let i=0;i<10;i++){
      const el=document.createElement('div');
      el.className='petal';
      el.textContent=sym[Math.floor(Math.random()*sym.length)];
      el.style.left=Math.random()*100+'vw';
      el.style.animationDuration=(10+Math.random()*12)+'s';
      el.style.animationDelay=(Math.random()*14)+'s';
      el.style.fontSize=(0.7+Math.random()*0.65)+'rem';
      wrap.appendChild(el);
    }
  })();

  /* ── Validation ── */
  function handleContinue(){
    const raw=document.getElementById('phone').value.replace(/\D/g,'');
    const err=document.getElementById('errorMsg');
    if(!/^01[3-9]\d{8}$/.test(raw)){
      err.classList.add('show');
      document.getElementById('phone').style.borderColor='#ff8080';
      return;
    }
    err.classList.remove('show');
    document.getElementById('phone').style.borderColor='';
    sessionStorage.setItem('eid_phone',raw);
    window.location.href='video.html';
  }

  document.getElementById('phone').addEventListener('input',function(){
    this.value=this.value.replace(/\D/g,'');
    document.getElementById('errorMsg').classList.remove('show');
    this.style.borderColor='';
  });
  document.getElementById('phone').addEventListener('keydown',function(e){
    if(e.key==='Enter')handleContinue();
  });
</script>
</body>
</html>
